TECHNICAL_REQUIREMENTS_CONFIGURATION_OPTIONS_LIST_ITEM_2_WAMP="WAMP (ویندوز) - برای اطلاعات بیشتر، به <a href=\"http://www.wampserver.com\" target=\"_blank\" rel=\"noopener noreferrer\">صفحه اصلی WampServer</a> مراجعه کنید"
TECHNICAL_REQUIREMENTS_CONFIGURATION_OPTIONS_LIST_ITEM_3_MAMP="WAMP (ویندوز) - برای اطلاعات بیشتر، از <a href=\"https://www.mamp.info\" target=\"_blank\" rel=\"noopener noreferrer\">صفحه اصلی ومپ‌سرور</a> مراجعه کنید"
TECHNICAL_REQUIREMENTS_CONFIGURATION_OPTIONS_LIST_ITEM_4_XAMPP="XAMPP زمپ (چندسکویی) - برای سایت‌های آنلاین مناسب نیست. برای اطلاعات بیشتر، به <a href=\"https://www.apachefriends.org/en/xampp.html\" target=\"_blank\" rel=\"noopener noreferrer\">صفحه اصلی زمپ</a> مراجعه کنید"
TECHNICAL_REQUIREMENTS_CONFIGURATION_OPTIONS_OUTRO="اگر به گزینه‌های دیگری نیاز دارید، توصیه می‌کنیم برای اطلاعات بیشتر از <a href=\"https://forum.joomla.org/viewforum.php?f=429\">انجمن‌های نصب</a> ما دیدن کنید یا <a href=\"https://docs.joomla.org/S:MyLanguage/Optional_Technical_Requirements\" title=\"Joomla Optional Technical Requirements\">لیست الزامات فنی اختیاری ما را بررسی کنید</a>."
TECHNICAL_REQUIREMENTS_FOOTNOTE_1_JOOMLA_3_PHP_SUPPORT="[1] PHP 5.3.1 برای نسخه‌های 3.0 تا 3.2 الزامی است. در نسخه 3.3، حداقل نیاز به PHP 5.3.10 افزایش یافته است. نسخه‌های جوملا! 3.5 و بالاتر با PHP 7 سازگار هستند."
TECHNICAL_REQUIREMENTS_FOOTNOTE_2_JOOMLA_3_MYSQL_SUPPORT="[2] از جوملا! 3.5، پشتیبانی از مجموعه کاراکتر `utf8mb4` مای‌اس‌کیوال اضافه شده و به‌طور پیش‌فرض توسط سرورهایی که از آن پشتیبانی می‌کنند، استفاده می‌شود."
TECHNICAL_REQUIREMENTS_FOOTNOTE_3_APACHE_SUPPORT="[3] برای استفاده از آدرس‌های سئو SEO URLs، نیاز به نصب افزونه mod_rewrite آپاچی دارید."
; The injected key is a link with the text "Zend Optimizer" (untranslated as this is a product name)
TECHNICAL_REQUIREMENTS_FOOTNOTE_4_JOOMLA_1X_PHP_SUPPORT="[4] از PHP 4.3.9، 4.4.2 یا 5.0.4 استفاده نکنید. این نسخه‌ها دارای باگ‌های شناخته‌شده‌ای هستند که در نصب اختلال ایجاد می‌کنند. %s 2.5.10 برای PHP 4.4 نیز دارای باگ‌های جدی است و باید از میزبان خود بخواهید به نسخه جدیدتری ارتقا دهد. نسخه‌های جوملا! 1.5.15 و بالاتر با PHP 5.3 سازگار هستند. توجه داشته باشید که کتابخانه OpenID با PHP 5.3 سازگار نیست."
TECHNICAL_REQUIREMENTS_FOOTNOTE_5_JOOMLA_25_SQL_SERVER_SUPPORT="[5] پشتیبانی از مایکروسافت اس‌کیوال سرور Microsoft SQL Server برای نسخه 2.5 اضافه شد؛ نسخه‌های 1.6 و 1.7 این پشتیبانی را ندارند."
TECHNICAL_REQUIREMENTS_FOOTNOTE_6_IIS_SUPPORT_INTRO="[6] برای مایکروسافت IIS Microsoft IIS (بسته به تنظیمات شما) ممکن است به موارد زیر نیاز داشته باشید:"
TECHNICAL_REQUIREMENTS_FOOTNOTE_6_IIS_SUPPORT_OUTRO="برای دریافت کمک بیشتر در مورد استفاده از Microsoft IIS مایکروسافت IIS، از <a href=\"https://forum.joomla.org/viewforum.php?f=543\">انجمن IIS جوملا!</a> دیدن کنید."
TECHNICAL_REQUIREMENTS_FOOTNOTE_6_LIST_ITEM_1_PHP="پی‌اچ‌پی - <a href=\"https://secure.php.net/manual/en/install.windows.php\" target=\"_blank\" rel=\"noopener noreferrer\">دستورالعمل‌های نصب</a>"
TECHNICAL_REQUIREMENTS_FOOTNOTE_6_LIST_ITEM_2_MYSQL="مای‌اس‌کیوال - <a href=\"https://dev.mysql.com/doc/mysql/en/windows-installation.html\" target=\"_blank\" rel=\"noopener noreferrer\">دستورالعمل‌های نصب</a>"
TECHNICAL_REQUIREMENTS_FOOTNOTE_6_LIST_ITEM_3_URL_REWRITE_MODULE="ماژول بازنویسی نشانی URL Rewrite Module مایکروسافت - فقط برای نشانی‌های سئو الزامی است. برای اطلاعات بیشتر، <a href=\"https://learn.iis.net/page.aspx/460/using-url-rewrite-module/\" target=\"_blank\" rel=\"noopener noreferrer\">اینجا کلیک کنید</a>. برای اطلاعات در مورد استفاده از ISAPI، <a href=\"https://docs.joomla.org/S:MyLanguage/Enabling_Search_Engine_Friendly_(SEF)_URLs_on_IIS\">اینجا کلیک کنید</a>."
TECHNICAL_REQUIREMENTS_FOOTNOTE_6_LIST_ITEM_4_FASTCGI="فست‌سی‌جی‌آی FastCGI - <a href=\"https://www.iis.net/downloads/default.aspx?tabid=34&amp;g=6&amp;i=1521\" target=\"_blank\" rel=\"noopener noreferrer\">دانلود برای IIS6</a>. <a href=\"https://www.iis.net/downloads/default.aspx?tabid=34&amp;i=1299&amp;g=6\" target=\"_blank\" rel=\"noopener noreferrer\">دانلود برای IIS7</a>."
TECHNICAL_REQUIREMENTS_FOOTNOTE_7_MINIMUM_SUPPORT="[7] این حداقل نسخه‌ای است که عملکرد آن تضمین شده است، نسخه‌های قدیمی‌تر ممکن است کار کنند اما پشتیبانی نمی‌شوند."
